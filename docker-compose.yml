version: "3.9"

services:
  app:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      RSS_APP_ENV: production
      RSS_DEBUG: "false"
      RSS_DATABASE_URL: postgresql+psycopg://rss:rss@db:5432/rss
      RSS_SOURCES_CONFIG_PATH: config/sources.example.yaml
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: rss
      POSTGRES_USER: rss
      POSTGRES_PASSWORD: rss
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
